<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Radio tower -->
  <rect x="45" y="20" width="10" height="60" fill="#3b82f6"/>
  <!-- Antenna -->
  <line x1="50" y1="20" x2="50" y2="5" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="50" cy="5" r="3" fill="#ef4444"/>

  <!-- Radio waves -->
  <path d="M30,40 Q50,25 70,40" stroke="#93c5fd" stroke-width="1.5" fill="none" stroke-dasharray="2,2"/>
  <path d="M30,50 Q50,35 70,50" stroke="#93c5fd" stroke-width="1.5" fill="none" stroke-dasharray="2,2"/>
  <path d="M30,60 Q50,45 70,60" stroke="#93c5fd" stroke-width="1.5" fill="none" stroke-dasharray="2,2"/>

  <!-- Radio body -->
  <rect x="25" y="60" width="50" height="25" rx="5" fill="#1e40af"/>

  <!-- Speaker -->
  <circle cx="40" cy="72" r="5" fill="#9ca3af"/>
  <circle cx="60" cy="72" r="5" fill="#9ca3af"/>

  <!-- Handle -->
  <rect x="35" y="55" width="30" height="5" rx="2" fill="#4b5563"/>
</svg>